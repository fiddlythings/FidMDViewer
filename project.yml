name: FidMDViewer
options:
  bundleIdPrefix: net.fiddlythings
  deploymentTarget:
    macOS: "10.15"
  xcodeVersion: "15.0"

packages:
  MarkdownRenderer:
    path: MarkdownRenderer

targets:
  FidMDViewer:
    type: application
    platform: macOS
    sources:
      - FidMDViewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fiddlythings.FidMDViewer
        ARCHS: "$(ARCHS_STANDARD)"
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
    dependencies:
      - package: MarkdownRenderer
      - target: QuickLookExtension
        embed: true
      - target: mdview
        embed: false
    postBuildScripts:
      - script: |
          # Copy mdview CLI into app bundle Resources
          cp "${BUILT_PRODUCTS_DIR}/mdview" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/mdview" 2>/dev/null || true
          # Copy render resources for CLI standalone HTML export
          BUNDLE_PATH=$(find "${BUILT_PRODUCTS_DIR}" -name "MarkdownRenderer_MarkdownRenderer.bundle" -maxdepth 1)
          if [ -d "$BUNDLE_PATH/Contents/Resources/Resources" ]; then
            cp "$BUNDLE_PATH/Contents/Resources/Resources/render.html" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/" 2>/dev/null || true
            cp "$BUNDLE_PATH/Contents/Resources/Resources/style.css" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/" 2>/dev/null || true
            cp "$BUNDLE_PATH/Contents/Resources/Resources/"*.min.js "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/" 2>/dev/null || true
            cp "$BUNDLE_PATH/Contents/Resources/Resources/"*.min.css "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/" 2>/dev/null || true
            cp -r "$BUNDLE_PATH/Contents/Resources/Resources/fonts" "${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Contents/Resources/" 2>/dev/null || true
          fi
        name: Copy mdview CLI and resources into app bundle
    info:
      path: FidMDViewer/Info.plist
      properties:
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Viewer
            NSDocumentClass: $(PRODUCT_MODULE_NAME).MarkdownDocument
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
            CFBundleTypeExtensions:
              - md
              - markdown
              - mdown
              - mkd
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
                - mdown
                - mkd
    entitlements:
      path: FidMDViewer/FidMDViewer.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true

  QuickLookExtension:
    type: app-extension
    platform: macOS
    sources:
      - QuickLookExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fiddlythings.FidMDViewer.QuickLookExtension
        ARCHS: "$(ARCHS_STANDARD)"
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: MarkdownRenderer
    info:
      path: QuickLookExtension/Info.plist
      properties:
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSExtension:
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - net.daringfireball.markdown
              - public.plain-text
            QLSupportsSearchableItems: false
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).PreviewViewController
    entitlements:
      path: QuickLookExtension/QuickLookExtension.entitlements
      properties:
        com.apple.security.app-sandbox: true

  mdview:
    type: tool
    platform: macOS
    sources:
      - mdview-cli
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fiddlythings.mdview
        ARCHS: "$(ARCHS_STANDARD)"
